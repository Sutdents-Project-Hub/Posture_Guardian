name: posture_guardian

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: posture_guardian
      POSTGRES_USER: posture_guardian
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Coolify}
    volumes:
      - posture_guardian_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U posture_guardian -d posture_guardian"]
      interval: 10s
      timeout: 5s
      retries: 8

  api:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql://posture_guardian:${POSTGRES_PASSWORD}@postgres:5432/posture_guardian
      CORS_ORIGINS: ${WEB_ORIGIN:?Set WEB_ORIGIN to the public HTTPS client origin}
      AI_PROVIDER: ${AI_PROVIDER:-fallback}
      AZURE_FOUNDRY_ENDPOINT: ${AZURE_FOUNDRY_ENDPOINT:-}
      AZURE_FOUNDRY_API_KEY: ${AZURE_FOUNDRY_API_KEY:-}
      AZURE_FOUNDRY_MODEL: ${AZURE_FOUNDRY_MODEL:-gpt-4.1-mini}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"

  web:
    build:
      context: ./app
      args:
        EXPO_PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:?Set PUBLIC_API_BASE_URL to the public HTTPS API URL}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "80"

volumes:
  posture_guardian_data:
